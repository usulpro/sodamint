  <ellipse cx="24" cy="16" rx="9" ry="2.6" fill="none" stroke="#9aa0a6" stroke-width="1.4"/>
  <!-- low, still liquid line -->
  <path d="M17.5 34 h13" stroke="#9aa0a6" stroke-width="1.6" stroke-linecap="round"/>
  <!-- sleep z's -->
  <path d="M30 12 h5 l-5 5 h5" fill="none" stroke="#9aa0a6" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M37 7 h3 l-3 3 h3" fill="none" stroke="#9aa0a6" stroke-width="1.2"
        stroke-linecap="round" stroke-linejoin="round"/>
