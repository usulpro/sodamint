<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Sodamint ON: fizzy mint soda -->
  <defs>
    <linearGradient id="soda" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4be08a"/>
      <stop offset="1" stop-color="#17a35c"/>
    </linearGradient>
  </defs>
  <!-- glass body -->
  <path d="M15 16 h18 l-2.5 24 a3 3 0 0 1 -3 2.6 h-7 a3 3 0 0 1 -3 -2.6 Z"
        fill="url(#soda)" stroke="#0f7a43" stroke-width="1.6" stroke-linejoin="round"/>
  <!-- liquid top ellipse -->
  <ellipse cx="24" cy="16" rx="9" ry="2.6" fill="#7defb0" stroke="#0f7a43" stroke-width="1.2"/>
  <!-- fizz bubbles -->
  <circle cx="21" cy="24" r="1.6" fill="#eafff2"/>
  <circle cx="27" cy="28" r="2" fill="#eafff2"/>
  <circle cx="23" cy="33" r="1.3" fill="#eafff2"/>
  <!-- rising bubbles above -->
  <circle cx="24" cy="10" r="1.5" fill="#4be08a"/>
  <circle cx="29" cy="7" r="1.1" fill="#4be08a"/>
  <!-- mint leaf -->
  <path d="M31 10 c5 -1 8 -4 8 -7 c-4 0 -8 2 -8 7 Z" fill="#2ec76f" stroke="#0f7a43" stroke-width="1"/>
  <path d="M31 10 q3 -2 6 -5" fill="none" stroke="#0f7a43" stroke-width="0.9"/>
</svg>
